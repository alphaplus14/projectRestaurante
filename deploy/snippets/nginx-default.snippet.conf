# Pegar al final de /opt/docker-vps/nginx/conf.d/default.conf

# Restaurante — API (backend Laravel)
server {
    listen 8083;

    location / {
        proxy_pass http://restaurante_back:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Restaurante — Frontend (React)
server {
    listen 8084;

    location / {
        proxy_pass http://restaurante_front:80;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
