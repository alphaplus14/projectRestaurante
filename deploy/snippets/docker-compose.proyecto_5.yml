# Pegar al final de /opt/docker-vps/docker-compose.yml
# Agregar también a nginx → depends_on: proyecto_5, proyecto_5_front

  proyecto_5:
    build: ./proyecto_5
    container_name: proyecto_5
    expose:
      - "80"
    volumes:
      - ./proyecto_5:/var/www/html
    depends_on:
      - mysql
    restart: always

  proyecto_5_front:
    build: ./proyecto_5_front
    container_name: proyecto_5_front
    expose:
      - "80"
    depends_on:
      - proyecto_5
    restart: always
